<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spazio Italiano // Workbench & Flashcards</title>
    <style>
        :root {
            --bg-main: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            --text-sub: #888888;
            --border-color: #eeeeee;
            --accent-color: #2e7d32; /* 意式经典森林绿 */
            --accent-bg: #f1f8e9;
            --card-bg: #fafafa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 顶部导航 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text-main);
        }

        .page-title {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* 🧱 强制平行双栏布局 */
        .main-grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }
        }

        .workspace {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-sub);
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            color: var(--text-main);
            background: var(--bg-main);
            box-sizing: border-box;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--text-main);
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .key-input {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.8rem;
            width: 180px;
            outline: none;
        }

        .btn-analyze {
            background-color: var(--text-main);
            color: var(--bg-main);
            border: none;
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            transition: opacity 0.2s;
        }

        .btn-analyze:hover {
            opacity: 0.9;
        }

        /* 分析结果展示面板 */
        .result-panel {
            margin-top: 20px;
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
            display: none;
        }

        .result-section {
            margin-bottom: 24px;
        }

        .result-section h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin: 0 0 12px 0;
            border-bottom: 1px dashed #ddd;
            padding-bottom: 6px;
        }

        .translation-text {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-main);
        }

        /* 语法排版优化区 */
        .grammar-text {
            font-size: 0.9rem; 
            color: var(--text-muted); 
            margin: 0;
            white-space: pre-line; /* 让大模型的换行自然呈现 */
        }

        /* 词汇卡片式提取区 */
        .vocab-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .vocab-item {
            background-color: #fafafa;
            border-left: 3px solid var(--accent-color);
            padding: 12px 16px;
            border-radius: 0 4px 4px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .vocab-word {
            font-weight: 700;
            color: var(--text-main);
        }

        .vocab-detail {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .btn-add-card {
            background: none;
            border: 1px solid var(--text-sub);
            color: var(--text-main);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .btn-add-card:hover {
            background-color: var(--text-main);
            color: #ffffff;
            border-color: var(--text-main);
        }

        /* 🧱 3D Flashcards 核心样式 */
        .flashcard-panel {
            background-color: #ffffff;
            border-left: 1px solid var(--border-color);
            padding-left: 30px;
        }

        @media (max-width: 900px) {
            .flashcard-panel {
                border-left: none;
                padding-left: 0;
                border-top: 1px solid var(--border-color);
                padding-top: 30px;
            }
        }

        .card-deck {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .flip-card {
            background-color: transparent;
            width: 100%;
            max-width: 380px;
            height: 200px;
            perspective: 1000px;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .flip-card.removing {
            opacity: 0;
            transform: scale(0.8) translateY(-20px);
            margin-bottom: -200px;
            pointer-events: none;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border-radius: 12px;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 24px;
            box-sizing: border-box;
        }

        .flip-card-front {
            background-color: #ffffff;
            color: var(--text-main);
        }

        .flip-card-front .word {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .flip-card-front .hint {
            font-size: 0.75rem;
            color: var(--text-sub);
        }

        .flip-card-back {
            background-color: var(--card-bg);
            color: var(--text-main);
            transform: rotateY(180deg);
            border-left: 5px solid var(--accent-color);
        }

        .flip-card-back .meaning {
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.5;
            padding: 0 10px;
        }

        .btn-delete-card {
            position: absolute;
            top: 12px;
            right: 14px;
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 5px;
            line-height: 1;
            z-index: 10;
            transition: color 0.2s, transform 0.2s;
        }

        .btn-delete-card:hover {
            color: #c62828;
            transform: scale(1.15);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="back-link">← Torna all'Oasi (返回绿洲)</a>
            <div class="page-title">Spazio Italiano 🌿</div>
        </header>

        <div class="main-grid">
            
            <div class="workspace">
                <div class="input-group">
                    <label for="it-input">Testo in Italiano / 意大利语输入</label>
                    <textarea id="it-input" placeholder="Inserisci qui la frase... (在此输入你想翻译和拆解的意大利语句子)"></textarea>
                </div>
                
                <div class="actions-bar">
                    <input type="password" id="apiKeyInput" class="key-input" placeholder="DeepSeek API Key (自动保存本地)" value="sk-65bd48dafbc64e0186c7d8eae2290dc4">
                    <button class="btn-analyze" onclick="analyzeItalian()">Analizza / 智能拆解</button>
                </div>

                <div class="result-panel" id="resultPanel">
                    
                    <div class="result-section">
                        <h3>Traduzione / 中文意译</h3>
                        <div class="translation-text" id="translationOutput"></div>
                    </div>

                    <div class="result-section">
                        <h3>Vocabolario / 词汇与短语提取</h3>
                        <div class="vocab-grid" id="vocabOutput"></div>
                    </div>

                    <div class="result-section">
                        <h3>Grammatica / 语法与变位透视</h3>
                        <p class="grammar-text" id="grammarOutput"></p>
                    </div>

                </div>
            </div>

            <div class="flashcard-panel">
                <div style="font-size: 0.85rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted);">Mazzo / 我的记忆闪卡堆 (点击翻面)</div>
                <div class="card-deck" id="flashcardContainer"></div>
            </div>

        </div>
    </div>

<script>
    const API_URL = "https://api.deepseek.com/v1/chat/completions"; 

    document.addEventListener("DOMContentLoaded", () => {
        renderStoredCards();
        // 初始化时尝试从 localStorage 恢复已存的密钥
        const savedKey = localStorage.getItem("ds_api_key");
        if (savedKey) {
            document.getElementById("apiKeyInput").value = savedKey;
        }
    });

    function getStoredCards() {
        const cards = localStorage.getItem("it_flashcards");
        return cards ? JSON.parse(cards) : [];
    }

    function saveCards(cards) {
        localStorage.setItem("it_flashcards", JSON.stringify(cards));
    }

    function toggleFlip(cardElement) {
        if (cardElement.classList.contains('removing')) return;
        cardElement.classList.toggle('flipped');
    }

    function renderStoredCards() {
        const container = document.getElementById('flashcardContainer');
        const cards = getStoredCards();
        
        if (cards.length === 0) {
            container.innerHTML = `
                <div class="flip-card" onclick="toggleFlip(this)">
                    <div class="flip-card-inner">
                        <div class="flip-card-front">
                            <div class="word">Spazio</div>
                            <div class="hint">点击卡片翻面 💡</div>
                        </div>
                        <div class="flip-card-back">
                            <div class="meaning">[s.m.] 空间 / 专属于你的意语角落</div>
                        </div>
                    </div>
                </div>
            `;
            return;
        }

        container.innerHTML = cards.map((card) => `
            <div class="flip-card" onclick="toggleFlip(this)" data-id="${card.id}">
                <div class="flip-card-inner">
                    <div class="flip-card-front">
                        <div class="word">${card.word}</div>
                        <div class="hint">Clicca per voltare 💡</div>
                    </div>
                    <div class="flip-card-back">
                        <button class="btn-delete-card" onclick="removeCard(event, this)">✕</button>
                        <div class="meaning">${card.meaning}</div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function addCard(word, meaning) {
        const cards = getStoredCards();
        
        if (cards.some(c => c.word === word)) {
            alert('卡片堆里已经有这个单词啦！');
            return;
        }

        const newCard = {
            id: Date.now(),
            word: word,
            meaning: meaning
        };

        cards.unshift(newCard); 
        saveCards(cards);
        renderStoredCards();
    }

    function removeCard(event, buttonElement) {
        event.stopPropagation(); 
        const cardElement = buttonElement.closest('.flip-card');
        const cardId = parseInt(cardElement.getAttribute('data-id'));

        cardElement.classList.add('removing'); 
        
        let cards = getStoredCards();
        cards = cards.filter(c => c.id !== cardId);
        saveCards(cards);

        setTimeout(() => {
            renderStoredCards();
        }, 400);
    }

    async function analyzeItalian() {
        const inputVal = document.getElementById('it-input').value.trim();
        const apiKey = document.getElementById('apiKeyInput').value.trim();

        if (!apiKey) {
            alert('请先输入有效的 DeepSeek API Key！');
            return;
        }
        if (!inputVal) {
            alert('Inserisci del testo prima! 请先输入一些意大利语内容！');
            return;
        }

        // 自动将可用的 API Key 存储到本地浏览器缓存
        localStorage.setItem("ds_api_key", apiKey);

        const panel = document.getElementById('resultPanel');
        panel.style.display = 'block';

        const transOut = document.getElementById('translationOutput');
        const vocabOut = document.getElementById('vocabOutput');
        const gramOut = document.getElementById('grammarOutput');

        transOut.innerHTML = `<span style="color: var(--text-muted); font-size:0.95rem;">Sto traducendo... 正在优雅翻译...</span>`;
        vocabOut.innerHTML = `<span style="color: var(--text-muted); font-size:0.95rem;">Analizzando le parole... 正在提取生词...</span>`;
        gramOut.innerHTML = `<span style="color: var(--text-muted); font-size:0.95rem;">Analizzando la grammatica... 正在透视语法变位...</span>`;

        const systemPrompt = `你是一位精通中文和意大利语的资深语言导师，同时也是一位拥有极简美学理念的文本分析专家。
请对用户输入的句子进行深度剖析。如果输入的是中文，请先将其翻译为优雅、地道的意大利语。
你必须严格且仅返回一个符合以下 JSON 格式的字符串，绝不能包含 Markdown 代码块标记（如 \`\`\`json）：
{
  "translation": "整句话的纯中文优雅意译/意语地道翻译",
  "vocabulary": [
    {"word": "核心单词/短语1", "detail": "[词性] 原型及其中文释义与语境拓展"}
  ],
  "grammar": "精炼且清晰地剖析句子中涉及的名词阴阳性单复数、动词时态变位、或核心特殊句型。"
}`;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "deepseek-chat", 
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: inputVal }
                    ],
                    temperature: 0.3, 
                    response_format: { "type": "json_object" } 
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            const result = JSON.parse(data.choices[0].message.content);

            transOut.textContent = result.translation || "暂无翻译";

            vocabOut.innerHTML = "";
            if (result.vocabulary && result.vocabulary.length > 0) {
                result.vocabulary.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'vocab-item';
                    
                    // 彻底安全的转义方案，防止因单双引号引起 onclick 传参解析失败
                    const escapedWord = item.word.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    const escapedDetail = item.detail.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');

                    card.innerHTML = `
                        <div style="flex: 1;">
                            <div class="vocab-word">${item.word}</div>
                            <div class="vocab-detail">${item.detail}</div>
                        </div>
                        <button class="btn-add-card" onclick="addCard('${escapedWord}', '${escapedDetail}')">➕ 存入卡片</button>
                    `;
                    vocabOut.appendChild(card);
                });
            } else {
                vocabOut.innerHTML = `<span style="color: var(--text-sub);">未能提取出核心词汇</span>`;
            }

            gramOut.textContent = result.grammar || "无特定语法解析";

        } catch (error) {
            console.error("API 请求出错了:", error);
            transOut.innerHTML = `<span style="color: #c62828;">Opps! 翻译连接失败了。</span>`;
            vocabOut.innerHTML = `<span style="color: #c62828;">请检查 API Key 是否正确，或网络是否通畅。</span>`;
            gramOut.innerHTML = `<span style="color: #c62828;">错误信息: ${error.message}</span>`;
        }
    }
</script>
</body>
</html>
