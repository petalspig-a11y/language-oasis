<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italian Flashcards</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --text-main: #111111;
            --text-sub: #777777;
            --accent: #0066cc; /* 与主页极简蓝视觉联动 */
            --border-radius: 8px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.02);
            --border-color: #eeeeee;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-bottom: 16px;
            text-align: center;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0 0 4px 0;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin: 0;
        }

        .flashcard-wrapper {
            width: 100%;
            height: 200px;
            perspective: 1000px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: var(--border-radius);
            padding: 20px;
            box-sizing: border-box;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
        }

        .card-front { z-index: 2; }

        .card-front h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
            text-align: center;
        }

        .card-front .hint {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin-top: 12px;
            letter-spacing: 0.5px;
        }

        .card-back { transform: rotateY(180deg); text-align: center; }

        .card-back h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: var(--accent);
        }

        .card-back .context {
            font-size: 0.8rem;
            color: var(--text-sub);
            line-height: 1.5;
            max-width: 90%;
            margin: 0;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 20px;
        }

        button {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
        }

        button:hover {
            background-color: #eeeeee;
        }

        .progress {
            font-size: 0.8rem;
            color: var(--text-sub);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="notebook-title">Spazio Italiano</h1>
        <p>点击卡片翻面 · 联动主页草稿实时更新</p>
    </header>

    <div class="flashcard-wrapper" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="card-face card-front">
                <h2 id="italian-word">Loading...</h2>
                <span class="hint">Tap to flip ↺</span>
            </div>
            <div class="card-face card-back">
                <h3 id="english-meaning">Meaning</h3>
                <p class="context" id="context">Context description</p>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="prev-btn" onclick="prevCard()">Prev</button>
        <span class="progress" id="progress">0 / 0</span>
        <button id="next-btn" onclick="nextCard()">Next</button>
    </div>
</div>

<script>
    // 默认基础词库：当主页草稿箱里没有检测到意大利语卡片格式时，自动用其兜底
    const defaultFlashcards = [
        { italian: "Sfumatura", meaning: "细微差别 / 渐变", context: "Nuance. 指颜色、情感或语气的微妙变化。" },
        { italian: "Buongiorno", meaning: "早上好 / 你好", context: "用于白天与陌生人或长辈打招呼。" },
        { italian: "Grazie", meaning: "谢谢", context: "注意末尾的 'e' 要轻声发音 [graht-tsee-eh]。" },
        { italian: "Buonanotte", meaning: "晚安", context: "用于深夜告别或上床睡觉时。" }
    ];

    let flashcards = [...defaultFlashcards];
    let currentIndex = 0;
    const cardElement = document.getElementById('card');

    // 🚀 核心联动：从主页的本地缓存提取数据，动态清洗并生成卡片
    function loadDynamicVocab() {
        const rawDump = localStorage.getItem('savedBrainDump') || '';
        if (!rawDump.trim()) {
            flashcards = [...defaultFlashcards];
            return;
        }

        const lines = rawDump.split('\n');
        const dynamicCards = [];

        // 匹配逻辑：自动捕捉含有 "-" 或 ":" 分隔符的行
        // 比如输入：Sfumatura - 细微差别
        // 或者输入：Rose : 玫瑰
        lines.forEach(line => {
            let separator = '';
            if (line.includes(' - ')) separator = ' - ';
            else if (line.includes(' : ')) separator = ' : ';
            else if (line.includes(':')) separator = ':';
            else if (line.includes('-')) separator = '-';

            if (separator) {
                const parts = line.split(separator);
                const word = parts[0].trim();
                const mean = parts[1].trim();
                
                // 排除带有日期标签的行头，且确保左右两侧都有内容
                if (word && mean && !word.includes(' /') && word.length < 30) {
                    dynamicCards.push({
                        italian: word,
                        meaning: mean,
                        context: "Captured dynamically from your Brain Dump."
                    });
                }
            }
        });

        if (dynamicCards.length > 0) {
            flashcards = dynamicCards;
            document.getElementById('notebook-title').innerText = "💡 Il Mio Quaderno";
        } else {
            flashcards = [...defaultFlashcards];
            document.getElementById('notebook-title').innerText = "Spazio Italiano";
        }
    }

    function updateCard() {
        cardElement.classList.remove('flipped');
        
        setTimeout(() => {
            if (flashcards.length === 0) return;
            document.getElementById('italian-word').innerText = flashcards[currentIndex].italian;
            document.getElementById('english-meaning').innerText = flashcards[currentIndex].meaning;
            document.getElementById('context').innerText = flashcards[currentIndex].context;
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${flashcards.length}`;
        }, 120);
    }

    function flipCard() {
        cardElement.classList.toggle('flipped');
    }

    function nextCard() {
        currentIndex = (currentIndex + 1) % flashcards.length;
        updateCard();
    }

    function prevCard() {
        currentIndex = (currentIndex - 1 + flashcards.length) % flashcards.length;
        updateCard();
    }

    // 🔄 监听主页面或者其他标签页的输入变动，实现无刷新同步
    window.addEventListener('storage', (e) => {
        if (e.key === 'savedBrainDump') {
            loadDynamicVocab();
            // 如果越界则归零
            if (currentIndex >= flashcards.length) currentIndex = 0;
            updateCard();
        }
    });

    // 定时主动轮询主页面缓存（解决在同一个复合视窗下的即时更新问题）
    setInterval(() => {
        const currentTotal = flashcards.length;
        loadDynamicVocab();
        if (flashcards.length !== currentTotal) {
            if (currentIndex >= flashcards.length) currentIndex = 0;
            updateCard();
        }
    }, 1500);

    // 初始化运行
    loadDynamicVocab();
    updateCard();
</script>

</body>
</html>
